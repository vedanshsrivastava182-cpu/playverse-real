<!DOCTYPE html>
<html>
<head>
<title>PlayVerse Real</title>

<style>
body{background:#0f0f0f;color:white;text-align:center;font-family:sans-serif}
.card{background:#1a1a2e;margin:10px;padding:15px;border-radius:10px}
button{padding:10px;margin:5px;background:#ff416c;border:none;color:white;border-radius:8px}
input{padding:8px;border-radius:5px;border:none}
</style>

</head>
<body>

<h1>🎮 PlayVerse Real</h1>

<h3>👥 Players Online: <span id="count">0</span></h3>

<div class="card">
<h2>💬 Chat</h2>
<input id="msg" placeholder="Type message">
<button onclick="send()">Send</button>
<p id="chat"></p>
</div>

<div class="card">
<h2>🎮 Game</h2>
<button onclick="move()">Play Move</button>
<p id="game"></p>
</div>

<div class="card">
<h2>🤖 Vedansh AI</h2>
<input id="aiInput" placeholder="Ask something">
<button onclick="askAI()">Ask</button>
<p id="aiOutput"></p>
</div>

<div class="card">
<h2>🎤 Voice Chat</h2>
<button onclick="startVoice()">Start Voice</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://unpkg.com/peerjs@1.3.2/dist/peerjs.min.js"></script>

<script>
const socket = io();

// 👥 PLAYER COUNT
socket.on("count", n=>{
document.getElementById("count").innerText = n;
});

// 💬 RECEIVE CHAT
socket.on("chat", msg=>{
document.getElementById("chat").innerText += "\n" + msg;
});

// 💬 SEND CHAT
function send(){
let m=document.getElementById("msg").value;
socket.emit("chat", "User: "+m);
}

// 🎮 GAME MOVE
function move(){
document.getElementById("game").innerText="You played move";
socket.emit("move","move");
}

// RECEIVE OTHER PLAYER MOVE
socket.on("move", ()=>{
document.getElementById("game").innerText="👥 Opponent moved";
});

// 🤖 AI CHATBOT
function askAI(){
let q=document.getElementById("aiInput").value.toLowerCase();
let res="";

if(q.includes("game")){
res="🎮 Game is running!";
}
else if(q.match(/[0-9]/)){
try{res="🧮 "+eval(q);}catch{res="Error";}
}
else{
res="❌ Maaf kijiye, game se related sawal puchiye.";
}

document.getElementById("aiOutput").innerText=res;
}

// 🎤 VOICE CHAT
let peer=new Peer();

peer.on("open",id=>{
alert("🎤 Your ID: "+id);
});

function startVoice(){
navigator.mediaDevices.getUserMedia({audio:true})
.then(stream=>{
peer.on("call",call=>{
call.answer(stream);
call.on("stream",audio=>{
let a=document.createElement("audio");
a.srcObject=audio;
a.play();
});
});

let id=prompt("Enter Friend ID:");
if(id){
let call=peer.call(id,stream);
call.on("stream",audio=>{
let a=document.createElement("audio");
a.srcObject=audio;
a.play();
});
}
});
}
</script>

</body>
</html>
